class SFX{constructor(){this.c=null}init(){if(!this.c)try{this.c=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}play(t){this.init();if(!this.c)return;if(this.c.state==='suspended')this.c.resume();try{const n=this.c.currentTime;if(t==="spin"){[0,.08,.16,.24,.32,.4].forEach((d,i)=>{const o=this.c.createOscillator(),g=this.c.createGain();o.type="square";o.frequency.value=400+i*80;g.gain.setValueAtTime(.08,n+d);g.gain.exponentialRampToValueAtTime(.001,n+d+.08);o.connect(g);g.connect(this.c.destination);o.start(n+d);o.stop(n+d+.08)})}else if(t==="tick"){const o=this.c.createOscillator(),g=this.c.createGain();o.type="triangle";o.frequency.value=800;g.gain.setValueAtTime(.05,n);g.gain.exponentialRampToValueAtTime(.001,n+.03);o.connect(g);g.connect(this.c.destination);o.start(n);o.stop(n+.03)}else if(t==="reveal"){[0,.12,.24,.36].forEach((d,i)=>{const o=this.c.createOscillator(),g=this.c.createGain();o.type="sine";o.frequency.value=500+i*150;g.gain.setValueAtTime(.15,n+d);g.gain.exponentialRampToValueAtTime(.001,n+d+.18);o.connect(g);g.connect(this.c.destination);o.start(n+d);o.stop(n+d+.18)})}else if(t==="fanfare"){[0,.1,.2,.35,.5,.65].forEach((d,i)=>{const o=this.c.createOscillator(),g=this.c.createGain();o.type="square";o.frequency.value=[440,554,659,880,1108,1318][i];g.gain.setValueAtTime(.15,n+d);g.gain.exponentialRampToValueAtTime(.001,n+d+.2);o.connect(g);g.connect(this.c.destination);o.start(n+d);o.stop(n+d+.2)})}else if(t==="correct"){[0,.08,.16,.28].forEach((d,i)=>{const o=this.c.createOscillator(),g=this.c.createGain();o.type="sine";o.frequency.value=[523,659,784,1047][i];g.gain.setValueAtTime(.2,n+d);g.gain.exponentialRampToValueAtTime(.001,n+d+.2);o.connect(g);g.connect(this.c.destination);o.start(n+d);o.stop(n+d+.2)})}else if(t==="tryagain"){const o=this.c.createOscillator(),g=this.c.createGain();o.type="sawtooth";o.frequency.value=200;g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.connect(g);g.connect(this.c.destination);o.start(n);o.stop(n+.3)}}catch(e){}}}
const sfx=new SFX();

function generateMCOptions(correctAnswer, topicData, selectedItem, topicType) {
  if (topicType === "ai-quiz") {
    const q = topicData.find(d => d.item === selectedItem);
    if (q && q.options) {
      const opts = [...q.options];
      for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[opts[i], opts[j]] = [opts[j], opts[i]]; }
      return opts;
    }
  }
  const allAnswers = [...new Set(topicData.map(d => d.answer))];
  const wrong = allAnswers.filter(a => a !== correctAnswer);
  for (let i = wrong.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[wrong[i], wrong[j]] = [wrong[j], wrong[i]]; }
  const picked = wrong.slice(0, 3);
  const options = [...picked, correctAnswer];
  for (let i = options.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[options[i], options[j]] = [options[j], options[i]]; }
  return options;
}

        <div className="current-topic-badge">{topic.icon} {topic.name}</div>
        <button className="mute-btn" onClick={()=>setIsMuted(!isMuted)}>{isMuted?"🔇":"🔊"}</button>
        
        {screen==="menu"?(
          <div className="menu-layout">
            <div className="menu-clown-left"><JugglingClown/></div>
            <div className="menu-container">
              <div className="menu-icon">{topic.icon}</div>
              <h1 className="menu-title">גלגל בקרקס</h1>
              <p className="menu-subtitle">מוכנים להיכנס למופע הגדול?</p>
              <p className="menu-topic-name">נושא: {topic.name} {nikudMode?"(עם ניקוד)":""}</p>
              <button className="primary-btn" onClick={startGame}>{"🎟️"} הכנסו למופע!</button>
              <div className="rules-board">
                <h3>{"📜"} כללי המופע</h3>
                <p>{"🎢"} הגלגל יגריל את השאלה</p>
                <p>{"✍️"} בחרו או הקלידו את התשובה</p>
                <p>{"🔄"} יש לכם <b>3 ניסיונות</b> לכל שאלה</p>
              </div>
            </div>
            <div className="menu-clown-right"><HandstandClown/></div>
          </div>
        ):(
          <>
            {showConfetti&&<div className="confetti-container">{[...Array(50)].map((_,i)=><div key={i} className="confetti-particle" style={{left:`${Math.random()*100}%`,backgroundColor:CIRCUS_COLORS[i%20],animationDelay:`${Math.random()*.6}s`,animationDuration:`${1.2+Math.random()*1.5}s`}}/>)}</div>}
            <div className="game-right">
              <div className="wheel-scene">
                <div className="wheel-container">
                  <div className="wheel-pointer">{"▼"}</div>
                  <div className="wheel-ring">{[...Array(32)].map((_,i)=><div key={i} className="light-bulb" style={{transform:`rotate(${i*11.25}deg) translateY(-50%)`}}/>)}</div>
                  <div className="wheel-disc" style={{background:`conic-gradient(${conic})`,transform:`rotate(${wheelAngle}deg)`,transition:isSpinning?"transform 2.5s cubic-bezier(0.17,0.67,0.12,0.99)":"none"}}>
                    {wheelItems.map((r,i)=><div key={i} className="wheel-label" style={{transform:`rotate(${i*segAngle+segAngle/2}deg)`}}><span className="wheel-text" style={{fontSize:wheelFontSize,top:wheelItems.length>16?"-225px":"-215px",direction:isLtr?"ltr":"inherit"}}>{getWheelText(r)}</span></div>)}
                    <div className="wheel-center"><span>{topic.icon}</span></div>
                  </div>
                </div>
                {topic.type==="ai-quiz"&&aiSourceText&&screen==="game"&&(
                  <button className="ai-source-btn" onClick={()=>setShowAiText(true)}>{"📄"} צפייה בטקסט המקורי</button>
                )}
              </div>
            </div>
            <div className="game-left">
              <div className="game-header">
                <button className="exit-btn" onClick={()=>setScreen("menu")}>{"←"} יציאה</button>
                <div className="stats-row">
                  <div className="stat-item"><span>{"⭐"}</span><span className="stat-val">{score}</span></div>
                  <div className="stat-item"><span>{"🔥"}</span><span className="stat-val">{streak}</span></div>
                  <div className="stat-item"><span>{"🎯"}</span><span className="stat-val">{correctCount}/{totalQ}</span></div>
                </div>
                <button className="stop-btn" onClick={()=>setShowSummary(true)}>סיכום</button>
              </div>
              <div className="action-area">
                {phase==="idle"&&<button className="primary-btn spin-btn" onClick={spinWheel}>{totalQ>0?"🔄 סובבו שוב!":"🎢 סובבו את הגלגל!"}</button>}
                {phase==="spinning"&&<div className="spin-msg"><div className="spin-dots"><span>{"★"}</span><span>{"★"}</span><span>{"★"}</span></div>הגלגל מסתובב...</div>}
                
                {revealStep>=1&&phase!=="spinning"&&phase!=="idle"&&(
                  <div className="reveal-area">
                    {topic.type==="verb"?(<>
                      <div className={`reveal-card ${revealStep>=1?"card-active":""}`}>
                        <div className="card-label">שורש</div>
                        <div className="card-value">{selectedRoot}</div>
                        <div className="card-sub">{CONJUGATIONS[selectedRoot]?.infinitive}</div>
                      </div>
                      {revealStep>=2&&<div className={`reveal-card ${revealStep>=2?"card-active":""}`}>
                        <div className="card-label">זמן</div>
                        <div className="card-value" style={{fontSize:"2.2rem"}}>{TENSE_ICONS[selectedTense]} {selectedTense}</div>
                      </div>}
                      {revealStep>=3&&selectedPerson&&<div className={`reveal-card ${revealStep>=3?"card-active":""}`}>
                        <div className="card-label">גוף</div>
                        <div className="card-value" style={{fontSize:"2.2rem"}}>{selectedPerson}</div>
                      </div>}
                    </>):(
                      <div className="reveal-card card-active single-card">
                        <div className="card-label">השאלה</div>
                        <div className="card-value" style={{fontSize:"2.2rem",direction:isLtr?"ltr":"inherit"}}>{getCardDisplay()}</div>
                      </div>
                    )}
                  </div>
                )}
                
                {phase==="answering"&&useTextInput&&(
                  <div className="answer-section fade-up">
                    <div className="answer-prompt">הקלידו את התשובה (מילה אחת):{attempts>0&&<span className="attempt-alert"> (ניסיון {attempts+1}/3)</span>}</div>
                    <div className="answer-row">
                      <input ref={inputRef} className={`answer-input ${shakeInput?"shake-anim":""}`} type="text" value={answer} onChange={e=>setAnswer(e.target.value)} onKeyDown={handleKey} placeholder="התשובה..." autoComplete="off" spellCheck="false"/>
                      <button className="submit-btn" onClick={checkAnswer} disabled={!answer.trim()}>אישור {"✓"}</button>
                    </div>
                    {attempts>0&&<div className="error-text">אופס! נסו שוב.</div>}
                  </div>
                )}

                {phase==="answering"&&!useTextInput&&(
                  <div className="answer-section fade-up mc-section">
                    <div className="answer-prompt">בחרו את התשובה הנכונה:{attempts>0&&<span className="attempt-alert"> (ניסיון {attempts+1}/3)</span>}</div>
                    <div className="mc-grid">
                      {mcOptions.map((opt,i)=>{
                        const isDis=disabledOptions.includes(opt);
                        return <button key={i} className={`mc-btn ${isDis?"mc-wrong":""}`} disabled={isDis} onClick={()=>handleMCClick(opt)}>{opt}</button>;
                      })}
                    </div>
                    {attempts>0&&<div className="error-text">אופס! נסו שוב.</div>}
                  </div>
                )}
                
                {phase==="result"&&(
                  <div className={`result-section fade-up ${isCorrect?"res-success":"res-error"}`}>
                    <div className="result-icon">{isCorrect?<MiniJuggleClown/>:<MiniSadClown/>}</div>
                    <div className="result-text">{isCorrect?"כל הכבוד! תשובה מדויקת!":"לא נורא, בהצלחה בסיבוב הבא!"}</div>
                    {!isCorrect&&<div className="result-answer"><span>התשובה הנכונה היא:</span><strong>{correctAnswer}</strong></div>}
                    {isCorrect&&streak>1&&<div className="result-streak">{"🔥"} רצף מטורף של {streak}! (+{streak*10} נקודות)</div>}
                  </div>
                )}
              </div>
            </div>
          </>
        )}
        
        {showMagicMenu&&(
          <div className="modal-overlay">
            <div className="modal-box magic-modal-box">
              <h2 className="modal-title">{"🪄"} בחר את נושא הקרקס</h2>
              
              <div className="nikud-toggle-row">
                <button className={`nikud-mode-btn ${nikudMode?"nikud-on":""}`} onClick={()=>setNikudMode(!nikudMode)}>
                  {nikudMode?"✦ עם ניקוד — פעיל":"✧ בלי ניקוד"}
                </button>
                <span className="nikud-hint">{nikudMode?"השאלות יוצגו מנוקדות לקריאה קלה":"לחצו להפעלת ניקוד אוטומטי"}</span>
              </div>

              <div className="presets-grid">{Object.entries(PRESETS).map(([id,p])=><button key={id} className="preset-item" onClick={()=>{setTopic(p);setShowMagicMenu(false);startGame()}}>{p.icon} {p.name}</button>)}</div>
              
              <div className="generator-sections-wrapper">
                <div className="custom-generator-table">
                  <div className="generator-header">
                    <h3>{"✏️"} צרו נושא משלכם:</h3>
                    <input type="text" className="custom-title-input" placeholder="שם הנושא" value={customTitle} onChange={e=>setCustomTitle(e.target.value)}/>
                    <div className="custom-type-toggle">
                      <span className="custom-type-label">סוג שאלות:</span>
                      <button className={`custom-type-btn ${customType==="mc"?"ct-active":""}`} onClick={()=>setCustomType("mc")}>{"🔘"} רב-ברירה</button>
                      <button className={`custom-type-btn ${customType==="text"?"ct-active":""}`} onClick={()=>setCustomType("text")}>{"✍️"} כתיבת תשובה</button>
                    </div>
                  </div>

                  {customType==="mc"?(
                    <div className="mc-table-wrapper">
                      {mcRows.map((row,i)=>(
                        <div className="mc-row-card" key={i}>
                          <div className="mc-row-header">
                            <span className="mc-row-num">שאלה {i+1}</span>
                            <button className="del-btn" onClick={()=>handleMcRemove(i)}>{"🗑️"}</button>
                          </div>
                          <input type="text" className="mc-q-input" placeholder="כתבו את השאלה..." value={row.q} onChange={e=>handleMcUpdate(i,'q',e.target.value)}/>
                          <div className="mc-opts-grid">
                            {["a","b","c","d"].map(k=>(
                              <div className="mc-opt-item" key={k}>
                                <input type="radio" name={`correct-${i}`} checked={row.correct===k} onChange={()=>handleMcUpdate(i,'correct',k)} className="mc-radio"/>
                                <input type="text" className="mc-opt-input" placeholder={`אופציה ${k==="a"?"1":k==="b"?"2":k==="c"?"3":"4"}`} value={row[k]} onChange={e=>handleMcUpdate(i,k,e.target.value)}/>
                              </div>
                            ))}
                          </div>
                          <div className="mc-correct-hint">{"✓"} סמנו את העיגול ליד התשובה הנכונה</div>
                        </div>
                      ))}
                      <div className="generator-actions">
                        <button className="add-row-btn" onClick={handleMcAdd}>{"➕"} הוסף שאלה</button>
                        <button className="primary-btn apply-btn" onClick={handleMcApply}>הפעל את הקסם! {"✨"}</button>
                      </div>
                    </div>
                  ):(
                    <>
                      <div className="table-wrapper">
                        <div className="t-row t-header"><div className="t-col">השאלה (בגלגל)</div><div className="t-col">התשובה</div><div className="t-col t-action"></div></div>
                        {customRows.map((row,index)=><div className="t-row" key={index}><div className="t-col"><input type="text" placeholder="למשל: 8 * 8" value={row.item} onChange={e=>handleUpdateRow(index,'item',e.target.value)}/></div><div className="t-col"><input type="text" placeholder="למשל: 64" value={row.answer} onChange={e=>handleUpdateRow(index,'answer',e.target.value)}/></div><div className="t-col t-action"><button className="del-btn" onClick={()=>handleRemoveRow(index)}>{"🗑️"}</button></div></div>)}
                      </div>
                      <div className="generator-actions"><button className="add-row-btn" onClick={handleAddRow}>{"➕"} הוסף שורה</button><button className="primary-btn apply-btn" onClick={handleCustomApply}>הפעל את הקסם! {"✨"}</button></div>
                    </>
                  )}
                </div>
                </div>
              <button className="close-link" onClick={()=>setShowMagicMenu(false)}>סגור תפריט</button>
            </div>
          </div>
        )}

        {showSummary&&(
          <div className="modal-overlay">
            <div className="modal-box">
              <h2 className="modal-title">{"🎪"} סיכום המופע</h2>
              <div className="stats-grid">
                <div className="stat-card"><div className="sc-icon">{"⭐"}</div><div className="sc-val">{score}</div><div className="sc-label">ניקוד כללי</div></div>
                <div className="stat-card"><div className="sc-icon">{"🎯"}</div><div className="sc-val">{correctCount}/{totalQ}</div><div className="sc-label">פגיעות בול</div></div>
                <div className="stat-card"><div className="sc-icon">{"📈"}</div><div className="sc-val">{pct}%</div><div className="sc-label">אחוז הצלחה</div></div>
                <div className="stat-card"><div className="sc-icon">{"🔥"}</div><div className="sc-val">{bestStreak}</div><div className="sc-label">רצף שיא</div></div>
              </div>
              <button className="export-btn" onClick={exportResults}>{"💾"} ייצא תוצאות למסמך</button>
              {wrongHistory.length>0&&<div className="mistakes-container"><h3>טעויות לאימון נוסף:</h3><div className="mistakes-list">{wrongHistory.map((h,i)=><div key={i} className="mistake-item"><div className="mistake-q">{h.context}</div><div className="mistake-a"><span className="mistake-wrong">{h.userAnswer}</span><span className="mistake-arrow">{"←"}</span><span className="mistake-correct">{h.correct}</span></div></div>)}</div></div>}
              {wrongHistory.length===0&&totalQ>0&&<div className="perfect-score">{"🌟"} מופע מושלם! מחיאות כפיים! {"🌟"}</div>}
              <div className="modal-actions"><button className="primary-btn" onClick={()=>setShowSummary(false)}>{"🔄"} חזרה למופע</button><button className="secondary-btn" onClick={()=>{setShowSummary(false);startGame()}}>{"🆕"} משחק חדש</button><button className="close-link" onClick={()=>{setShowSummary(false);setScreen("menu")}}>{"📋"} למסך הראשי</button></div>
            </div>
          </div>
        )}

        {showAiText&&(
          <div className="modal-overlay">
            <div className="modal-box ai-text-modal">
              <h2 className="modal-title">{"📄"} הטקסט המקורי</h2>
              <p style={{fontSize:"0.9rem",color:"#7F8C8D",marginBottom:"0.8rem",fontWeight:600}}>{"🔍"} חפשו את התשובה בטקסט וחזרו לענות</p>
              <div className="ai-text-content">{aiSourceText}</div>
              <button className="primary-btn" onClick={()=>setShowAiText(false)}>{"🔙"} חזרה למשחק</button>
            </div>
          </div>
        )}

        <div className="credit-badge">יצרה באמצעות ai: מורן קמיל גלברג- הוראה מותאמת</div>
      </div>
    </div>
  );
}
